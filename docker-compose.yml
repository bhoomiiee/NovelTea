version: '3.9'

services:

  # ── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./noveltea-backend
      dockerfile: Dockerfile
    container_name: noveltea-backend
    restart: unless-stopped
    environment:
      - PORT=5000
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Persist uploaded PDFs across container restarts
      - uploads_data:/app/uploads
    networks:
      - noveltea-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Nginx + React) ─────────────────────────────────────────────────
  frontend:
    build:
      context: ./noveltea-frontend
      dockerfile: Dockerfile
    container_name: noveltea-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - noveltea-net

volumes:
  uploads_data:

networks:
  noveltea-net:
    driver: bridge
